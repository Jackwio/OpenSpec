name: spec-driven
version: 1
description: 預設OpenSpec工作流程 - 提案→規格→設計→任務
artifacts:
  - id: proposal
    generates: proposal.md
    description: 概述變更的初始提案文件
    template: proposal.md
    instruction: |
      建立提案文件來確定為什麼需要進行此更改。

      部分：
      - **為什麼**：關於問題或機會的 1-2 句話。這解決了什麼問題？為什麼是現在？
      - **更改內容**：更改項目符號清單。具體說明新功能、修改或刪除。用 **BREAKING** 標記重大更改。
      - **功能**：決定將建立或修改哪些規格：
        - **新功能**：列出正在引入的功能。每一個都成為新的 `specs/<name>/spec.md`。使用短橫線命名（例如， `user-auth`, `data-export`).
        - **修改的功能**：列出其需求正在變更的現有功能。僅包含規範層級行為發生變化的情況（而不僅僅是實作細節）。每個都需要一個增量規範檔。檢視 `openspec/specs/` 對於現有的規格名稱。如果沒有要求更改，則留空。
      - **影響**：受影響的代碼、APIs、依賴項或系統。

      重要提示：「功能」部分至關重要。它建立了之間的合約
      提案和規格階段。在填寫之前研究現有規格。
      此處列出的每個功能都需要相應的規格文件。

      保持簡潔（1-2 頁）。專注於「為什麼」而不是「如何」——
      實作細節位於 design.md 中。

      這是基礎——規格、設計和任務都建立在這個基礎上。
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: 變更的詳細規格
    template: spec.md
    instruction: |
      建立定義系統應該做什麼的規格文件。

      為提案「功能」部分中列出的每個功能建立一個規格文件。
      - 新功能：使用提案中的確切 kebab-case 名稱（規格/<capability>/spec.md）。
      - 修改功能：使用 openspec/specs/ 中現有的規格資料夾名稱<capability>/ 在規格中建立增量規格時/<capability>/spec.md.

      Delta 操作（使用 ## 標頭）：
      - **新增的要求**：新功能
      - **修改的要求**：行為改變 - 必須包含完整更新的內容
      - **刪除的要求**：已棄用的功能 - 必須包括 **原因** 和 **遷移**
      - **重新命名要求**：僅更改名稱 - 使用 FROM:/TO: 格式

      格式要求：
      - 每項要求： `### Requirement: <name>` 接下來是描述
      - 使用“SHALL”/“MUST”來表達規範性要求（避免“should”/“may”）
      - 每個場景： `#### Scenario: <name>` 具有 WHEN/THEN 格式
      - **關鍵**：場景必須使用 4 個主題標籤（`####`）。使用 3 個主題標籤或項目符號將會失敗。
      - 每個需求必須至少有一個場景。

      修改後的需求工作流程：
      1. 在 openspec/specs/ 中找到現有需求<capability>/spec.md
      2. 複製整個需求區塊（來自 `### Requirement:` 透過所有場景）
      3.貼到下面 `## MODIFIED Requirements` 並進行編輯以反映新的行為
      4. 確保標題文字完全匹配（空格不敏感）

      常見陷阱：對部分內容使用 MODIFIED 會在存檔時遺失細節。
      如果新增問題而不改變現有行為，請改用 ADDED。

      例子：
      ```
      ## 新增的要求

      ### 需求：使用者可以匯出資料
      系統應允許使用者以 CSV 格式匯出資料。

      #### 場景：成功匯出
      - **何時** 使用者點選「匯出」按鈕
      - **然後**系統下載包含所有用戶資料的 CSV 文件

      ## 刪除的要求

      ### 需求：舊版匯出
      **原因**：被新的匯出系統取代
      **遷移**：使用 /api/v2/export 處的新匯出端點
      ```

      規格應該是可測試的——每個場景都是潛在的測試案例。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 包含實施細節的技術設計文件
    template: design.md
    instruction: |
      建立解釋如何實施變更的設計文件。

      何時包含 design.md（僅在適用時建立）：
      - 橫切變化（多個服務/模組）或新的架構模式
      - 新的外部相依性或重大資料模型更改
      - 安全性、效能或遷移複雜性
      - 編碼前技術決策帶來的歧義

      部分：
      - **背景**：背景、現況、限制、利害關係人
      - **目標/非​​目標**：此設計實現的目標和明確排除的目標
      - **決策**：關鍵技術選擇及其基本原理（為什麼選擇 X 而不是 Y？）。包括為每個決定考慮的替代方案。
      - **風險/權衡**：已知的限制，可能出錯的事情。格式：[風險] → 緩解措施
      - **遷移計畫**：部署步驟、回溯策略（如果適用）
      - **懸而未決的問題**：尚未解決的決定或未知的問題

      專注於架構和方法，而不是逐行實現。
      請參考提案的動機和要求的規格。

      好的設計文件可以解釋技術決策背後的「原因」。
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: 包含可追蹤任務的實施清單
    template: tasks.md
    instruction: |
      建立分解實施工作的任務清單。

      **重要提示：嚴格遵循下面的範本。 ** 應用階段解析
      核取方塊格式來追蹤進度。未使用的任務 `- [ ]` 不會被追蹤。

      指南：
      - 將相關任務分組到 ## 編號標題下
      - 每個任務必須是一個核取方塊： `- [ ] X.Y Task description`
      - 任務應該要夠小，可以在一次會話中完成
      - 依依賴性對任務進行排序（必須先做什麼？）

      例子：
      ```
      ## 1. 設定

      - [ ] 1.1 建立新的模組結構
      - [ ] 1.2 在package.json中加入依賴

      ## 2. 核心實現

      - [ ] 2.1 實作資料匯出功能
      - [ ] 2.2 新增 CSV 格式化實用程式
      ```

      需要建構什麼的參考規範，以及如何建構它的設計。
      每項任務都應該是可驗證的——你知道它何時完成。
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    閱讀上下文文件，處理待處理的任務，隨時標記為完成。
    如果您遇到阻礙或需要澄清，請暫停。
